<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — IGSVCS</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="blob"></div><div class="blob"></div><div class="blob"></div>
<canvas id="bg"></canvas>

<nav>
  <a href="index.html" class="brand">
    <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
      <polygon points="20,2 37,11 37,29 20,38 3,29 3,11" stroke="#fff" stroke-width="1.5"/>
      <polygon points="20,8 31,14 31,26 20,32 9,26 9,14" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
      <line x1="20" y1="12" x2="20" y2="28" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="12" y1="20" x2="28" y2="20" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="4.2" stroke="#fff" stroke-width="1.4"/>
      <circle cx="20" cy="20" r="1.3" fill="#fff"/>
    </svg>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="contact.html">Contact</a>
    <a href="policy.html">Policy</a>
    <a href="cart.html" class="cart-link active" title="Cart">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="cart-badge" id="cart-badge">0</span>
    </a>
  </div>
</nav>

<div class="wrapper">
  <p class="page-label">Your Order</p>
  <h1>Cart</h1>
  <p class="subtitle">Review your selected services before checkout.</p>
  <div class="divider"></div>
  <div id="cart-content" style="width:100%;max-width:760px;"></div>
</div>

<footer>
  © 2026 IGSVCS &nbsp;·&nbsp;
  <a href="policy.html">Refund Policy</a> &nbsp;·&nbsp;
  <a href="contact.html">Contact</a>
</footer>

<script src="cart.js"></script>
<script src="bg.js"></script>
<script>
function render() {
  const items = Cart.get();
  const el = document.getElementById('cart-content');
  if (items.length === 0) {
    el.innerHTML = `
      <div class="empty-cart">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <p style="margin-bottom:6px;">Your cart is empty.</p>
        <p style="font-size:0.75rem;color:#222;">Add a service from the home page.</p>
        <a href="index.html" class="btn btn-primary" style="margin-top:22px;display:inline-flex;">Browse Services</a>
      </div>`;
    return;
  }
  const rows = items.map(item => `
    <tr>
      <td><div class="item-name">${item.name}</div><div class="item-sub">${item.label}</div></td>
      <td>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty('${item.id}',${item.qty-1})">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty('${item.id}',${item.qty+1})">+</button>
        </div>
      </td>
      <td class="item-price">$${(item.price*item.qty).toLocaleString()}</td>
      <td>
        <button class="remove-btn" title="Remove" onclick="removeItem('${item.id}')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </td>
    </tr>`).join('');

  el.innerHTML = `
    <table class="cart-table">
      <thead><tr><th>Service</th><th>Qty</th><th>Price</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="cart-summary">
      <div>
        <div class="cart-total-label">Total</div>
        <div class="cart-total-amount">$${Cart.total().toLocaleString()}</div>
      </div>
      <div class="cart-actions">
        <button class="btn btn-ghost" onclick="clearCart()">Clear Cart</button>
        <a href="index.html" class="btn btn-outline">Add More</a>
        <a href="checkout.html" class="btn btn-primary">Checkout →</a>
      </div>
    </div>
    <p style="font-size:0.7rem;color:#222;margin-top:16px;text-align:right;">
      By proceeding you agree to our <a href="policy.html" style="color:#3a3a3a;">Refund Policy</a>.
    </p>`;
}

function changeQty(id, qty) { if (qty < 1) { removeItem(id); return; } Cart.setQty(id, qty); render(); }
function removeItem(id) { Cart.remove(id); render(); }
function clearCart() { Cart.clear(); render(); }

render();
</script>
</body>
</html>
